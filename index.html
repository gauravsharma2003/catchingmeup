<!doctype html>
<html lang="en">
<head>

  <title>Catch Me Up — Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500;1,9..144,700&family=Inter:wght@400;500;600&display=swap">
  <style>
    :root {
      --paper: #f3eee3;
      --paper-deep: #ebe3cf;
      --ink: #14110f;
      --ink-soft: #2c2823;
      --ink-muted: #6f6a62;
      --rule: #d8d1c2;
      --accent: #b8261d;
      --gold: #d4a373;
      --image-fade: linear-gradient(180deg, rgba(20,17,15,0) 0%, rgba(20,17,15,0.05) 50%, rgba(20,17,15,0.55) 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--paper-deep);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      height: 100dvh;
      max-width: 560px;
      margin: 0 auto;
      background: var(--paper);
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      box-shadow: 0 0 60px rgba(20,17,15,0.06);
    }
    main::-webkit-scrollbar { display: none; }

    /* progress chip */
    .progress {
      position: fixed;
      top: max(env(safe-area-inset-top), 14px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--ink-muted);
      background: rgba(243,238,227,0.86);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(20,17,15,0.06);
      transition: opacity .25s ease, color .25s, background .25s;
      opacity: 0;
      pointer-events: none;
    }
    .progress.visible { opacity: 1; }
    .progress.over-dark {
      color: var(--paper);
      background: rgba(20,17,15,0.55);
      border-color: rgba(243,238,227,0.12);
    }

    /* ============ MASTHEAD ============ */
    .masthead {
      min-height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: 32px 28px max(env(safe-area-inset-bottom), 28px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .masthead::before {
      content: '';
      position: absolute;
      left: 28px;
      right: 28px;
      top: 76px;
      height: 1px;
      background: var(--ink);
      opacity: 0.85;
    }

    .masthead-top {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .brand {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .edition-meta {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .masthead-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      max-width: 480px;
      padding: 24px 0;
    }

    .masthead-hero .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .masthead-hero .kicker::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    .masthead-hero h1 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(44px, 13vw, 76px);
      line-height: 0.94;
      letter-spacing: -0.025em;
      color: var(--ink);
    }
    .masthead-hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .masthead-hero p {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 17px;
      line-height: 1.45;
      color: var(--ink-muted);
      max-width: 340px;
    }

    .masthead-foot {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }
    .stats { line-height: 1.6; }
    .stats strong {
      display: block;
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-style: italic;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-transform: none;
    }

    .swipe-hint {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .swipe-hint .arrow {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 28px;
      line-height: 1;
      color: var(--ink);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: translateY(0); }
      50%      { opacity: 1;    transform: translateY(4px); }
    }

    /* ============ CARD (text) ============ */
    .card {
      min-height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: 56px 28px max(env(safe-area-inset-bottom), 32px);
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      isolation: isolate;
      overflow: hidden;
      transition: background-color .2s;
    }
    .card:active { background-color: var(--paper-deep); }

    .card-num {
      position: absolute;
      top: 32px;
      right: 28px;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--ink);
      opacity: 0.18;
      z-index: 1;
    }

    .card-letter {
      position: absolute;
      top: -8vh;
      right: -12vw;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 78vw;
      line-height: 0.78;
      color: var(--ink);
      opacity: 0.045;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .card-kicker {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 2;
    }
    .card-kicker::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    .card-tag {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(54px, 16vw, 92px);
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin: 36px 0 28px;
      position: relative;
      z-index: 2;
    }
    .card-tag::after {
      content: '.';
      color: var(--accent);
      margin-left: -0.05em;
    }

    .card-summary {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 21px;
      line-height: 1.42;
      color: var(--ink-soft);
      max-width: 480px;
      margin-bottom: auto;
      padding-bottom: 32px;
      position: relative;
      z-index: 2;
    }
    .card-summary::first-letter {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.05em;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      position: relative;
      z-index: 2;
    }
    .card-read {
      color: var(--ink);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .card-read::after {
      content: '→';
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0;
      transition: transform .2s;
    }
    .card:hover .card-read::after { transform: translateX(4px); }

    /* review flag */
    .card.needs-review .card-kicker::after {
      content: '· flagged';
      color: var(--ink-muted);
      letter-spacing: 0.15em;
    }

    /* ============ CARD (image) ============ */
    .card.has-image {
      padding: 0;
      background: var(--ink);
      color: var(--paper);
    }
    .card.has-image:active { background-color: #000; }

    .card.has-image .card-image {
      flex: 1.1;
      min-height: 50dvh;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .card.has-image .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--image-fade);
    }
    .card.has-image .image-num {
      position: absolute;
      top: 22px;
      right: 22px;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 38px;
      line-height: 1;
      color: var(--paper);
      opacity: 0.85;
      mix-blend-mode: difference;
      z-index: 2;
    }

    .card.has-image .card-body {
      padding: 32px 28px max(env(safe-area-inset-bottom), 32px);
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: var(--ink);
      color: var(--paper);
    }
    .card.has-image .card-kicker {
      color: var(--gold);
    }
    .card.has-image .card-kicker::before {
      background: var(--gold);
    }
    .card.has-image .card-tag {
      color: var(--paper);
      margin: 0;
      font-size: clamp(40px, 11vw, 60px);
    }
    .card.has-image .card-tag::after { color: var(--gold); }
    .card.has-image .card-summary {
      color: rgba(243,238,227,0.82);
      padding-bottom: 0;
      margin-bottom: 0;
      font-size: 19px;
    }
    .card.has-image .card-meta {
      color: rgba(243,238,227,0.55);
      border-top-color: rgba(243,238,227,0.15);
    }
    .card.has-image .card-read { color: var(--paper); }

    /* ============ END CARD ============ */
    .end-card {
      min-height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      gap: 32px;
      position: relative;
    }
    .end-card::before, .end-card::after {
      content: '';
      position: absolute;
      left: 28px;
      right: 28px;
      height: 1px;
      background: var(--rule);
    }
    .end-card::before { top: 28%; }
    .end-card::after  { bottom: 28%; }
    .end-mark {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      letter-spacing: 0.8em;
      color: var(--accent);
      padding-left: 0.8em;
    }
    .end-text {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(40px, 11vw, 64px);
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--ink);
    }
    .end-text em { font-style: normal; color: var(--accent); }
    .end-meta {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ============ ERROR ============ */
    .error {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      padding: 32px;
      text-align: center;
    }
    .error h2 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 36px;
      line-height: 1;
      color: var(--ink);
    }
    .error p {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink-muted);
      max-width: 360px;
    }
    .error code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background: rgba(20,17,15,0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--ink);
    }
  </style>
</head>

      "section": "health",
      "section_family": "health",
      "headline": "AIIMS Reshuffle",
      "summary": "AIIMS Delhi to get interim director after M Srinivas moved to NITI Aayog.",
      "image_url": "",

<!--END_INLINE_DATA--></script>

  <div class="progress" id="progress" aria-live="polite">— / —</div>

  <main id="deck">
    <section class="masthead" aria-label="Edition cover">
      <div class="masthead-top">
        <div class="brand">Catch Me Up</div>
        <div class="edition-meta" id="edition-meta">Loading edition…</div>
      </div>

      <div class="masthead-hero">
        <div class="kicker">A finite edition</div>
        <h1>What changed in the last <em>12 hours</em>.</h1>
        <p>Every story, one tag. Tap any card to open the original.</p>
      </div>

      <div class="masthead-foot">
        <div class="stats" id="masthead-stats">
          <strong>—</strong>
          <span>stories · <span id="read-time">— min</span></span>
        </div>
        <div class="swipe-hint">
          <span>Scroll</span>
          <span class="arrow">↓</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const IMAGE_POSITIONS = new Set([1, 4, 8, 12]);
    const TOI_PHOTO = id => `https://static.toiimg.com/photo.cms?photoid=${id}`;
    const TOI_ARTICLE = msid => `https://timesofindia.indiatimes.com/articleshow/${msid}.cms`;

    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    function escapeHTML(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString('en-IN', {
        day: 'numeric', month: 'short',
        hour: '2-digit', minute: '2-digit', hour12: false,
      });
    }

    function pad2(n) { return String(n).padStart(2, '0'); }

    function preload(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const t = setTimeout(() => reject(new Error('timeout')), 5000);
        img.onload = () => { clearTimeout(t); resolve(url); };
        img.onerror = () => { clearTimeout(t); reject(new Error('error')); };
        img.src = url;
      });
    }

    async function resolveImage(card) {
      const tries = [card.image_url, TOI_PHOTO(card.msid)].filter(Boolean);
      for (const url of tries) {
        try { return await preload(url); } catch {}
      }
      return null;
    }

    function kickerFor(c) {
      const fam = (c.section_family || '').toUpperCase();
      const sec = (c.section || '').replace(/_/g, ' ').toUpperCase();
      return fam || sec || 'STORY';
    }

    function renderText(c) {
      const isLetter = c.position % 3 !== 1;  // ~2/3 of text cards get letter; rest get number-only
      const ch = (c.section_family || c.section || '?').charAt(0).toUpperCase();
      const reviewClass = c.needs_review ? ' needs-review' : '';
      return `
        <a class="card${reviewClass}"
           data-position="${c.position}"
           data-image="false"
           href="${TOI_ARTICLE(c.msid)}"
           target="_blank" rel="noopener noreferrer">
          ${isLetter ? `<span class="card-letter" aria-hidden="true">${ch}</span>` : ''}
          <span class="card-num">${pad2(c.position)}</span>
          <div class="card-kicker">${escapeHTML(kickerFor(c))}</div>
          <h2 class="card-tag">${escapeHTML(c.headline)}</h2>
          <p class="card-summary">${escapeHTML(c.summary)}</p>
          <div class="card-meta">
            <span>${escapeHTML(fmtDate(c.published_at))}</span>
            <span class="card-read">Read story</span>
          </div>
        </a>`;
    }

    function renderImage(c, imageUrl) {
      const reviewClass = c.needs_review ? ' needs-review' : '';
      return `
        <a class="card has-image${reviewClass}"
           data-position="${c.position}"
           data-image="true"
           href="${TOI_ARTICLE(c.msid)}"
           target="_blank" rel="noopener noreferrer">
          <div class="card-image" style="background-image:url('${imageUrl}')">
            <span class="image-num">${pad2(c.position)}</span>
          </div>
          <div class="card-body">
            <div class="card-kicker">${escapeHTML(kickerFor(c))}</div>
            <h2 class="card-tag">${escapeHTML(c.headline)}</h2>
            <p class="card-summary">${escapeHTML(c.summary)}</p>
            <div class="card-meta">
              <span>${escapeHTML(fmtDate(c.published_at))}</span>
              <span class="card-read">Read story</span>
            </div>
          </div>
        </a>`;
    }

    function renderEnd(data) {
      return `
        <section class="end-card" data-position="${data.total_cards + 1}" data-end="true">
          <div class="end-mark">·  ·  ·</div>
          <div class="end-text">You're <em>caught up</em>.</div>
          <div class="end-meta">
            ${data.total_cards} stories · edition closed at ${fmtDate(data.generated_at)}
          </div>
        </section>`;
    }

    function showError(msg) {
      const deck = $('#deck');
      deck.innerHTML = `
        <div class="error">
          <h2>No edition yet.</h2>
          <p>Generate <code>output/cards.json</code> using the rewrite prompt, then refresh.</p>
          <p>Tip: serve the project root with <code>python3 -m http.server 8000</code> and open <code>http://localhost:8000/web/</code>.</p>
          <p style="opacity:.6">${escapeHTML(msg)}</p>
        </div>`;
    }

    async function loadCards() {
      // 1. Try inline data first (used by the standalone shareable build)
      const inline = document.getElementById('cards-data');
      if (inline) {
        const raw = inline.textContent
          .replace('<!--BEGIN_INLINE_DATA-->', '')
          .replace('<!--END_INLINE_DATA-->', '')
          .trim();
        if (raw) {
          try { return JSON.parse(raw); }
          catch (e) { console.warn('inline cards-data parse failed', e); }
        }
      }
      // 2. Fall back to fetching cards.json (dev workflow with local server)
      const candidates = ['../output/cards.json', 'output/cards.json'];
      let lastErr;
      for (const url of candidates) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) { lastErr = `${url}: ${res.status}`; continue; }
          return await res.json();
        } catch (e) { lastErr = `${url}: ${e.message}`; }
      }
      throw new Error(lastErr || 'cards.json not found');
    }

    function setupProgress(total) {
      const progress = $('#progress');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (!e.isIntersecting) return;
          const el = e.target;
          const pos = el.dataset.position;
          const isImage = el.dataset.image === 'true';
          const isEnd = el.dataset.end === 'true';
          const isMast = el.classList.contains('masthead');
          if (isMast) {
            progress.classList.remove('visible');
            return;
          }
          if (isEnd) {
            progress.textContent = `${pad2(total)} / ${pad2(total)}`;
            progress.classList.remove('over-dark');
            progress.classList.add('visible');
            return;
          }
          progress.textContent = `${pad2(parseInt(pos, 10))} / ${pad2(total)}`;
          progress.classList.toggle('over-dark', isImage);
          progress.classList.add('visible');
        });
      }, { threshold: 0.55 });
      $$('.masthead, .card, .end-card').forEach(el => observer.observe(el));
    }

    async function render(data) {
      $('#edition-meta').textContent =
        `Edition · ${fmtDate(data.data_now || data.generated_at)}`;
      $('#masthead-stats').innerHTML =
        `<strong>${data.total_cards}</strong>
         <span>stories · ~${(data.estimated_read_time_min ?? (data.total_cards * 0.22)).toFixed(1)} min</span>`;

      // image preflight in parallel for image-positioned cards
      const jobs = data.cards.map(async c =>
        IMAGE_POSITIONS.has(c.position) ? [c, await resolveImage(c)] : [c, null]
      );
      const resolved = await Promise.all(jobs);

      const html = resolved
        .map(([c, url]) => url ? renderImage(c, url) : renderText(c))
        .join('') + renderEnd(data);

      $('#deck').insertAdjacentHTML('beforeend', html);
      setupProgress(data.total_cards);
    }

    loadCards()
      .then(render)
      .catch(err => showError(err.message || String(err)));
  </script>
</body>
</html>
