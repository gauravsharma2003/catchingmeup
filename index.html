<!doctype html>

  <title>Catch Me Up — Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500;1,9..144,700&family=Inter:wght@400;500;600&display=swap">
  <style>
    :root {
      --paper: #f3eee3;
      --paper-deep: #ebe3cf;
      --ink: #14110f;
      --ink-soft: #2c2823;
      --ink-muted: #6f6a62;
      --rule: #d8d1c2;
      --rule-strong: #14110f;
      --accent: #b8261d;
      --gold: #d4a373;
      --image-fade: linear-gradient(180deg, rgba(20,17,15,0) 30%, rgba(20,17,15,0.65) 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--paper-deep);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .paper {
      max-width: 640px;
      margin: 0 auto;
      background: var(--paper);
      min-height: 100dvh;
      box-shadow: 0 0 60px rgba(20,17,15,0.06);
      position: relative;
    }

    a { color: inherit; text-decoration: none; }

    /* ============ MASTHEAD ============ */
    .masthead {
      padding: 36px 28px 24px;
      border-bottom: 4px double var(--rule-strong);
      position: relative;
    }
    .masthead-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .masthead-row .left, .masthead-row .right { white-space: nowrap; }
    .wordmark {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(48px, 12vw, 72px);
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 16px 0 14px;
    }
    .wordmark em { font-style: normal; color: var(--accent); }
    .tagline {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      line-height: 1.4;
      color: var(--ink-muted);
      max-width: 360px;
      font-style: italic;
    }

    /* ============ TAB BAR ============ */
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      padding: 12px 28px;
      scroll-behavior: smooth;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 6px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      color: var(--paper);
      background: var(--ink);
      border-color: var(--ink);
    }
    .tab .count {
      opacity: 0.55;
      margin-left: 6px;
      font-feature-settings: 'tnum';
    }

    /* ============ SECTION FLAG ============ */
    .section {
      padding: 0 28px;
      scroll-margin-top: 56px;
    }
    .section-flag {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding: 56px 0 20px;
      border-bottom: 1px solid var(--rule-strong);
      margin-bottom: 32px;
    }
    .section-flag .name {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(40px, 10vw, 60px);
      line-height: 0.95;
      letter-spacing: -0.025em;
      color: var(--ink);
    }
    .section-flag .name em {
      font-style: normal;
      color: var(--accent);
      font-weight: 700;
    }
    .section-flag .meta {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-align: right;
      line-height: 1.6;
    }
    .section-flag .meta strong {
      display: block;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-transform: none;
    }

    /* ============ FRONT PAGE ============ */
    .front {
      padding: 0 28px 48px;
    }
    .front-flag {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 32px 0 14px;
      border-bottom: 1px solid var(--rule-strong);
      margin-bottom: 24px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .front-flag .right { color: var(--ink-muted); font-weight: 500; }

    .lead {
      display: flex;
      flex-direction: column;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 28px;
      cursor: pointer;
    }
    .lead .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lead .kicker::before {
      content: '';
      width: 22px;
      height: 1px;
      background: var(--accent);
    }
    .lead .image {
      width: 100%;
      aspect-ratio: 3 / 2;
      background: var(--paper-deep);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .lead .image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center 28%;
    }
    .lead .image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--image-fade);
      pointer-events: none;
    }
    .lead .image .caption {
      position: absolute;
      bottom: 12px;
      left: 14px;
      right: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--paper);
      z-index: 2;
      opacity: 0.85;
    }
    .lead .headline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(34px, 7.5vw, 46px);
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 18px;
    }
    .lead .summary {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.5;
      color: var(--ink-soft);
      margin-bottom: 18px;
      max-width: 520px;
    }
    .lead .summary::first-letter {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-style: normal;
      font-size: 3.2em;
      float: left;
      line-height: 0.85;
      margin: 4px 10px 0 0;
      color: var(--ink);
    }
    .lead .meta {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .front-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    /* ============ STORY CARD (compact) ============ */
    .story {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      position: relative;
    }
    .story:last-child { border-bottom: none; }
    .story.with-image {
      grid-template-columns: 1fr 104px;
      grid-template-rows: auto auto auto;
      gap: 4px 14px;
    }
    .story.with-image .image {
      grid-column: 2;
      grid-row: 1 / 4;
      aspect-ratio: 4 / 5;
      background: var(--paper-deep);
      width: 104px;
      overflow: hidden;
      position: relative;
    }
    .story.with-image .image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center 28%;
    }
    .story .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .story .kicker .dot {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .story .headline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    .story .summary {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 1.45;
      color: var(--ink-soft);
    }
    .story .meta {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 4px;
    }
    .story .meta .read {
      color: var(--ink);
      font-weight: 600;
    }
    .story .meta .read::after {
      content: ' →';
      font-family: 'Fraunces', serif;
      font-style: italic;
    }

    /* hero variant inside section */
    .story.hero {
      grid-template-columns: 1fr;
      padding-bottom: 32px;
    }
    .story.hero .image {
      grid-column: 1;
      grid-row: auto;
      width: 100%;
      aspect-ratio: 3 / 2;
      margin-bottom: 16px;
      background: var(--paper-deep);
      overflow: hidden;
      position: relative;
    }
    .story.hero .image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center 28%;
    }
    .story.hero .headline { font-size: 28px; }

    /* ============ END CARD ============ */
    .end {
      padding: 80px 28px;
      text-align: center;
      border-top: 4px double var(--rule-strong);
      margin-top: 24px;
    }
    .end .mark {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      letter-spacing: 0.8em;
      color: var(--accent);
      padding-left: 0.8em;
      margin-bottom: 24px;
    }
    .end .text {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(40px, 10vw, 56px);
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 18px;
    }
    .end .text em { font-style: normal; color: var(--accent); }
    .end .meta {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .end .colophon {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      font-family: 'Fraunces', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--ink-muted);
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    /* ============ ERROR ============ */
    .error {
      padding: 80px 28px;
      text-align: center;
    }
    .error h2 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 36px;
      margin-bottom: 16px;
    }
    .error p {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink-muted);
      max-width: 360px;
      margin: 0 auto 8px;
    }
    .error code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background: rgba(20,17,15,0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--ink);
    }

    /* small-screen tweaks */
    @media (max-width: 380px) {
      .masthead, .section, .front { padding-left: 22px; padding-right: 22px; }
      .tabs { padding-left: 22px; padding-right: 22px; }
      .lead .summary::first-letter { font-size: 2.6em; }
    }
  </style>

        <span class="right" id="edition-date">—</span>
      </div>
      <div class="wordmark">Catch <em>Me</em> Up</div>
      <div class="tagline">A finite morning edition. The news, in tags. Tap any story to open the original.</div>
    </header>

    <nav class="tabs-wrap" id="tabs-wrap">
      <div class="tabs" id="tabs"></div>
    </nav>

    <main id="paper-body"></main>
  </div>

  <script>
    const TOI_PHOTO = id => `https://static.toiimg.com/photo.cms?photoid=${id}`;
    const TOI_ARTICLE = msid => `https://timesofindia.indiatimes.com/articleshow/${msid}.cms`;

    const FAMILY_LABEL = {
      politics: 'Politics',
      war: 'World',
      justice: 'Justice',
      sports: 'Sports',
      economy: 'Economy',
      business: 'Business',
      science: 'Tech',
      health: 'Health',
      lifestyle: 'Living',
      religion: 'Society',
      labour: 'Work',
      governance: 'Government',
      disaster: 'Disaster',
      environment: 'Climate',
      society: 'Society',
    };

    const FAMILY_BLURB = {
      politics: 'Power, parties, parliament.',
      war: 'Conflict, diplomacy, the world.',
      justice: 'Courts, enforcement, crime.',
      sports: 'Pitches, courts, rinks.',
      economy: 'Markets, trade, money.',
      business: 'Corporates, deals, leadership.',
      science: 'Tech, AI, the future of work.',
      health: 'Medicine, public health, science.',
      lifestyle: 'Culture, food, leisure.',
      religion: 'Faith, festivals, society.',
      labour: 'Jobs, wages, workplaces.',
      governance: 'The state, policy, the centre.',
      disaster: 'Earthquakes, floods, fires.',
      environment: 'Climate, planet, ecology.',
      society: 'People, places, life.',
    };

    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    function escapeHTML(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    function fmtDate(iso, opts) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString('en-IN', opts || {
        day: 'numeric', month: 'short',
        hour: '2-digit', minute: '2-digit', hour12: false,
      });
    }

    function fmtEditionDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function familyLabel(fam) {
      return FAMILY_LABEL[fam] || (fam ? fam.charAt(0).toUpperCase() + fam.slice(1) : 'Story');
    }
    function familyBlurb(fam) { return FAMILY_BLURB[fam] || ''; }

    function preload(url) {
      return new Promise((res, rej) => {
        const img = new Image();
        const t = setTimeout(() => rej(), 5000);
        img.onload = () => { clearTimeout(t); res(url); };
        img.onerror = () => { clearTimeout(t); rej(); };
        img.src = url;
      });
    }
    async function resolveImage(card) {
      const tries = [card.image_url, TOI_PHOTO(card.msid)].filter(Boolean);
      for (const url of tries) {
        try { return await preload(url); } catch {}
      }
      return null;
    }

    function pickFrontPage(cards, n = 4) {
      const front = [];
      const seen = new Set();
      for (const c of cards) {
        if (seen.has(c.section_family)) continue;
        front.push(c);
        seen.add(c.section_family);
        if (front.length >= n) break;
      }
      // if fewer than n unique families, top up with next-best regardless
      if (front.length < n) {
        for (const c of cards) {
          if (front.includes(c)) continue;
          front.push(c);
          if (front.length >= n) break;
        }
      }
      return front;
    }

    function groupBySection(cards) {
      const order = [];
      const groups = new Map();
      for (const c of cards) {
        const key = c.section_family || 'other';
        if (!groups.has(key)) {
          groups.set(key, []);
          order.push(key);
        }
        groups.get(key).push(c);
      }
      return order.map(k => ({ family: k, cards: groups.get(k) }));
    }

    function renderLead(c, imageUrl) {
      const img = imageUrl ? `
        <div class="image">
          <img src="${imageUrl}" alt="" loading="lazy" decoding="async">
          <span class="caption">${escapeHTML(familyLabel(c.section_family))} · MSID ${escapeHTML(c.msid)}</span>
        </div>` : '';
      return `
        <a class="lead" href="${TOI_ARTICLE(c.msid)}" target="_blank" rel="noopener">
          <div class="kicker">Lead · ${escapeHTML(familyLabel(c.section_family))}</div>
          ${img}
          <h2 class="headline">${escapeHTML(c.headline)}</h2>
          <p class="summary">${escapeHTML(c.summary)}</p>
          <div class="meta">${escapeHTML(fmtDate(c.published_at))} · Read story →</div>
        </a>`;
    }

    function renderStory(c, imageUrl, opts = {}) {
      const isHero = !!opts.hero;
      const klass = isHero ? 'story hero' : (imageUrl ? 'story with-image' : 'story');
      const img = imageUrl ? `<div class="image"><img src="${imageUrl}" alt="" loading="lazy" decoding="async"></div>` : '';
      return `
        <a class="${klass}" href="${TOI_ARTICLE(c.msid)}" target="_blank" rel="noopener">
          ${img}
          <div class="kicker"><span class="dot"></span>${escapeHTML(familyLabel(c.section_family))}</div>
          <h3 class="headline">${escapeHTML(c.headline)}</h3>
          <p class="summary">${escapeHTML(c.summary)}</p>
          <div class="meta">
            <span>${escapeHTML(fmtDate(c.published_at))}</span>
            <span class="read">Read</span>
          </div>
        </a>`;
    }

    function renderFront(cards, images) {
      const lead = cards[0];
      const rest = cards.slice(1);
      return `
        <section class="front" id="sec-front" data-section="front">
          <div class="front-flag">
            <span>Front Page</span>
            <span class="right">Top ${cards.length} of ${images._total}</span>
          </div>
          ${renderLead(lead, images[lead.msid] || null)}
          <div class="front-grid">
            ${rest.map(c => renderStory(c, images[c.msid] || null)).join('')}
          </div>
        </section>`;
    }

    function renderSection(group, images, idx) {
      const fam = group.family;
      const label = familyLabel(fam);
      const blurb = familyBlurb(fam);
      const cards = group.cards;
      // give the first card in each section a hero treatment if it has an image
      const first = cards[0];
      const firstImg = images[first.msid] || null;
      const firstHTML = renderStory(first, firstImg, { hero: !!firstImg });
      const restHTML = cards.slice(1).map(c => renderStory(c, images[c.msid] || null)).join('');
      return `
        <section class="section" id="sec-${fam}" data-section="${fam}">
          <div class="section-flag">
            <div class="name">${escapeHTML(label)}<em>.</em></div>
            <div class="meta">
              <strong>${cards.length}</strong>
              ${cards.length === 1 ? 'story' : 'stories'}
              ${blurb ? `<br><span style="font-style:italic;font-weight:400;letter-spacing:0;font-size:11px;text-transform:none;color:var(--ink-muted)">${escapeHTML(blurb)}</span>` : ''}
            </div>
          </div>
          ${firstHTML}${restHTML}
        </section>`;
    }

    function renderEnd(data) {
      return `
        <section class="end">
          <div class="mark">·  ·  ·</div>
          <div class="text">You're <em>caught up</em>.</div>
          <div class="meta">${data.total_cards} stories · edition closed at ${fmtDate(data.generated_at)}</div>
          <div class="colophon">A finite, daily edition. Built to be read in five minutes and put down.</div>
        </section>`;
    }

    function renderTabs(sections) {
      const tabsEl = $('#tabs');
      const items = [{ key: 'front', label: 'Front', count: null }]
        .concat(sections.map(s => ({ key: s.family, label: familyLabel(s.family), count: s.cards.length })));
      tabsEl.innerHTML = items.map((t, i) => `
        <button class="tab${i === 0 ? ' active' : ''}" data-target="sec-${t.key}">
          ${escapeHTML(t.label)}${t.count != null ? `<span class="count">${t.count}</span>` : ''}
        </button>
      `).join('');
      tabsEl.addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (!btn) return;
        const target = document.getElementById(btn.dataset.target);
        if (target) {
          const offset = $('#tabs-wrap').offsetHeight;
          const top = target.getBoundingClientRect().top + window.scrollY - offset - 8;
          window.scrollTo({ top, behavior: 'smooth' });
        }
      });
    }

    function setupSpy() {
      const tabsEl = $('#tabs');
      const tabs = $$('.tab');
      const wrapH = $('#tabs-wrap').offsetHeight;
      const sections = $$('section[data-section]');
      const map = new Map(sections.map(s => [s.id, s]));
      const observer = new IntersectionObserver(entries => {
        entries.forEach(en => {
          if (en.isIntersecting) {
            const id = en.target.id;
            tabs.forEach(t => {
              const active = t.dataset.target === id;
              t.classList.toggle('active', active);
              if (active) {
                const r = t.getBoundingClientRect();
                const wr = tabsEl.getBoundingClientRect();
                if (r.left < wr.left || r.right > wr.right) {
                  t.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
              }
            });
          }
        });
      }, { rootMargin: `-${wrapH + 12}px 0px -65% 0px`, threshold: 0 });
      sections.forEach(s => observer.observe(s));
    }

    function showError(msg) {
      $('#paper-body').innerHTML = `
        <div class="error">
          <h2>No edition yet.</h2>
          <p>Generate <code>output/cards.json</code> with the rewrite prompt, then refresh.</p>
          <p>Tip: serve the project root with <code>python3 -m http.server 8000</code> and open <code>http://localhost:8000/web/</code>.</p>
          <p style="opacity:.6">${escapeHTML(msg)}</p>
        </div>`;
    }

    async function loadCards() {
      const inline = document.getElementById('cards-data');
      if (inline) {
        const raw = inline.textContent
          .replace('<!--BEGIN_INLINE_DATA-->', '')
          .replace('<!--END_INLINE_DATA-->', '')
          .trim();
        if (raw) {
          try { return JSON.parse(raw); }
          catch (e) { console.warn('inline cards-data parse failed', e); }
        }
      }
      const candidates = ['../output/cards.json', 'output/cards.json'];
      let lastErr;
      for (const url of candidates) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) { lastErr = `${url}: ${res.status}`; continue; }
          return await res.json();
        } catch (e) { lastErr = `${url}: ${e.message}`; }
      }
      throw new Error(lastErr || 'cards.json not found');
    }

    async function buildPaper(data) {
      // header meta
      $('#edition-date').textContent = fmtEditionDate(data.data_now || data.generated_at).toUpperCase();
      $('#edition-no').textContent = String(data.total_cards).padStart(3, '0');

      // pick front page (top scored, one per section family)
      const front = pickFrontPage(data.cards, 4);
      const frontIds = new Set(front.map(c => c.msid));
      const remaining = data.cards.filter(c => !frontIds.has(c.msid));
      const sections = groupBySection(remaining);

      // resolve images: front-page lead + first card of each section get image attempt
      const wantImages = new Set([
        front[0].msid,
        ...front.slice(1, 2).map(c => c.msid),  // optional 2nd front-page image
        ...sections.map(g => g.cards[0].msid),
      ]);
      const images = { _total: data.total_cards };
      await Promise.all(data.cards.map(async c => {
        if (!wantImages.has(c.msid)) return;
        const url = await resolveImage(c);
        if (url) images[c.msid] = url;
      }));

      // render
      const html = [
        renderFront(front, images),
        ...sections.map((g, i) => renderSection(g, images, i)),
        renderEnd(data),
      ].join('');
      $('#paper-body').innerHTML = html;

      // tabs + spy
      renderTabs(sections);
      // wait for next paint then spy
      requestAnimationFrame(setupSpy);
    }

    loadCards()
      .then(buildPaper)
      .catch(err => showError(err.message || String(err)));
  </script>
</body>
</html>
