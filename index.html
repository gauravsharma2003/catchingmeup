  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,700;1,9..144,900&family=Inter:wght@400;500;600&display=swap">
  <style>
    :root {
      --paper: #f3eee3;
      --paper-deep: #ebe3cf;
      --ink: #14110f;
      --ink-soft: #2c2823;
      --ink-muted: #6f6a62;
      --rule: #cfc7b3;
      --rule-strong: #14110f;
      --accent: #b8261d;
      --gold: #b8915b;
      --image-fade: linear-gradient(180deg, rgba(20,17,15,0) 35%, rgba(20,17,15,0.55) 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--paper-deep);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .paper {
      max-width: 720px;
      margin: 0 auto;
      background: var(--paper);
      min-height: auto;
      box-shadow: 0 0 60px rgba(20,17,15,0.06);
      position: relative;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ============================================================
       MASTHEAD (front page only)
       ============================================================ */
    .masthead {
      padding: 22px 24px 14px;
      text-align: center;
      border-bottom: 4px double var(--rule-strong);
      position: relative;
    }
    .masthead-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 12px;
    }
    .masthead-row::before, .masthead-row::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .masthead-row span {
      white-space: nowrap;
      padding: 0 8px;
    }
    .wordmark {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(54px, 14vw, 88px);
      line-height: 0.95;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 4px 0;
    }
    .wordmark em { font-style: normal; color: var(--accent); font-weight: 900; }
    .tagline {
      font-family: 'Fraunces', serif;
      font-size: 13px;
      line-height: 1.3;
      color: var(--ink-muted);
      font-style: italic;
      margin-top: 6px;
    }

    /* ============================================================
       INSIDE TODAY index ribbon
       ============================================================ */
    .inside-bar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .inside-bar .label {
      font-family: 'Fraunces', serif;
      font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 500;
      font-size: 13px;
      color: var(--ink);
      margin-right: 6px;
    }
    .inside-bar a {
      color: var(--ink);
      transition: color .2s;
      position: relative;
    }
    .inside-bar a:hover { color: var(--accent); }

    /* ============================================================
       PAGE (front + sections)
       ============================================================ */
    .page {
      padding: 0 24px 10px;
      scroll-margin-top: 12px;
    }

    .page-flag {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px 0 6px;
      border-bottom: 1px solid var(--rule-strong);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .page-flag .meta {
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      font-weight: 500;
    }
    .page-flag .section-name {
      color: var(--ink);
      letter-spacing: 0.22em;
      text-align: right;
    }

    .section-title {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(38px, 9vw, 56px);
      line-height: 0.96;
      letter-spacing: -0.025em;
      color: var(--ink);
      padding: 12px 0 2px;
    }
    .section-title em {
      font-style: normal;
      color: var(--accent);
      font-weight: 700;
    }
    .section-blurb {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink-muted);
      margin-bottom: 14px;
      max-width: 480px;
    }

    /* ============================================================
       STORY: BASE
       ============================================================ */
    .story {
      display: block;
      cursor: pointer;
      color: var(--ink);
      transition: opacity .2s;
    }
    .story:hover { opacity: 0.78; }

    .story .kicker {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .story .kicker .tag {
      color: var(--accent);
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0;
      text-transform: none;
    }
    .story .kicker .sep {
      width: 16px;
      height: 1px;
      background: var(--rule);
    }
    .story .headline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      letter-spacing: -0.018em;
      color: var(--ink);
    }
    .story .deck {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      color: var(--ink-soft);
      line-height: 1.45;
    }
    .story .byline {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .story .byline .read {
      color: var(--ink);
      font-weight: 600;
    }
    .story .byline .read::after {
      content: ' →';
      font-family: 'Fraunces', serif;
      font-style: italic;
    }

    /* ============================================================
       BLOCK: HERO (lead story)
       ============================================================ */
    .block-hero {
      padding: 14px 0 18px;
      border-bottom: 1px solid var(--rule);
    }
    .block-hero .image {
      width: 100%;
      aspect-ratio: 3 / 2;
      background: var(--paper-deep);
      overflow: hidden;
      position: relative;
      margin-bottom: 18px;
    }
    .block-hero .image img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 28%;
    }
    .block-hero .image::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--image-fade);
      pointer-events: none;
    }
    .block-hero .image .caption {
      position: absolute;
      left: 12px; right: 12px; bottom: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.9;
      z-index: 2;
    }
    .block-hero .headline {
      font-size: clamp(32px, 6vw, 44px);
      line-height: 1.04;
      margin-bottom: 16px;
    }
    .block-hero .deck {
      font-size: 17px;
      max-width: 560px;
      margin-bottom: 4px;
    }
    .block-hero .deck::first-letter {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-style: normal;
      font-size: 3.4em;
      float: left;
      line-height: 0.82;
      margin: 6px 10px -4px 0;
      color: var(--ink);
    }

    /* ============================================================
       BLOCK: TWO-UP
       ============================================================ */
    .block-twoup {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 22px 0;
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .block-twoup::before {
      content: '';
      position: absolute;
      left: 50%; top: 22px; bottom: 22px;
      width: 1px;
      background: var(--rule);
    }
    .block-twoup .story {
      padding: 0 12px;
    }
    .block-twoup .story:first-child { padding-left: 0; }
    .block-twoup .story:last-child { padding-right: 0; }
    .block-twoup .headline {
      font-size: 19px;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .block-twoup .deck {
      font-size: 13.5px;
      line-height: 1.4;
    }
    .block-twoup .byline { font-size: 8.5px; padding-top: 8px; margin-top: 10px; }
    .block-twoup.single { grid-template-columns: 1fr; }
    .block-twoup.single::before { display: none; }
    .block-twoup.single .story { padding: 0; }

    /* ============================================================
       BLOCK: THREE-UP
       ============================================================ */
    .block-threeup {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      padding: 22px 0;
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .block-threeup .story { padding: 0 12px; }
    .block-threeup .story:first-child { padding-left: 0; }
    .block-threeup .story:last-child { padding-right: 0; }
    .block-threeup .story + .story {
      border-left: 1px solid var(--rule);
    }
    .block-threeup .headline {
      font-size: 16px;
      line-height: 1.18;
      margin-bottom: 6px;
    }
    .block-threeup .deck {
      font-size: 12px;
      line-height: 1.4;
    }
    .block-threeup .byline { display: none; }

    @media (max-width: 460px) {
      .block-threeup { grid-template-columns: 1fr 1fr; }
      .block-threeup .story:nth-child(3) {
        grid-column: 1 / -1;
        padding: 16px 0 0;
        margin-top: 16px;
        border-top: 1px solid var(--rule);
        border-left: none;
      }
    }

    /* ============================================================
       BLOCK: BRIEF (single full-width compact, optional thumb)
       ============================================================ */
    .block-brief {
      padding: 20px 0;
      border-bottom: 1px solid var(--rule);
    }
    .block-brief .story.with-image {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .block-brief .story.with-image > .brief-text {
      flex: 1 1 auto;
      min-width: 0;
    }
    .block-brief .story.with-image > .image {
      flex: 0 0 96px;
      width: 96px;
      height: 120px;
      background: var(--paper-deep);
      overflow: hidden;
    }
    .block-brief .story.with-image > .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 28%;
    }
    .block-brief .headline {
      font-size: 22px;
      line-height: 1.12;
      margin-bottom: 8px;
    }
    .block-brief .deck {
      font-size: 14px;
      line-height: 1.4;
    }

    /* ============================================================
       BLOCK: PULL QUOTE (decorative, in long sections)
       ============================================================ */
    .block-pullquote {
      padding: 22px 24px;
      margin: 0 -24px;
      background: var(--paper-deep);
      border-top: 1px solid var(--rule-strong);
      border-bottom: 1px solid var(--rule-strong);
      text-align: center;
    }
    .block-pullquote q {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(20px, 4.5vw, 26px);
      line-height: 1.25;
      letter-spacing: -0.015em;
      color: var(--ink);
      quotes: '“' '”';
    }
    .block-pullquote .attr {
      display: block;
      margin-top: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* The last block in each section doesn't need its own bottom rule —
       the next section's page-flag is the visual break. */
    .page > *:last-child { border-bottom: none; }

    /* ============================================================
       END / ERROR
       ============================================================ */
    .end {
      padding: 48px 24px 38px;
      text-align: center;
      border-top: 4px double var(--rule-strong);
      margin-top: 0;
    }
    .end .mark {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      letter-spacing: 0.8em;
      color: var(--accent);
      padding-left: 0.8em;
      margin-bottom: 22px;
    }
    .end .text {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(38px, 10vw, 54px);
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 18px;
    }
    .end .text em { font-style: normal; color: var(--accent); }
    .end .meta {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .end .colophon {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid var(--rule);
      font-family: 'Fraunces', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--ink-muted);
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .error { padding: 80px 24px; text-align: center; }
    .error h2 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 36px;
      margin-bottom: 16px;
    }
    .error p {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink-muted);
      max-width: 360px;
      margin: 0 auto 8px;
    }
    .error code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background: rgba(20,17,15,0.06);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    /* small phone tweaks */
    @media (max-width: 380px) {
      .page, .masthead, .inside-bar { padding-left: 18px; padding-right: 18px; }
      .block-pullquote { padding-left: 18px; padding-right: 18px; margin-left: -18px; margin-right: -18px; }
      .block-hero .headline { font-size: 28px; }
    }
  </style>

  <div class="paper">
    <header class="masthead">
      <div class="masthead-row">
        <span>Vol.1 · No.<span id="edition-no">—</span></span>
        <span id="edition-date">—</span>
      </div>
      <div class="wordmark">Catch <em>Me</em> Up</div>
      <div class="tagline">A finite morning edition · Read in five, put down in five</div>
    </header>

    <div class="inside-bar" id="inside-bar"><span class="label">Inside today:</span></div>

    <main id="paper-body"></main>
  </div>

  <script>
    const TOI_PHOTO = id => `https://static.toiimg.com/photo.cms?photoid=${id}`;
    const TOI_ARTICLE = msid => `https://timesofindia.indiatimes.com/articleshow/${msid}.cms`;

    const FAMILY_LABEL = {
      politics: 'Politics', war: 'World', justice: 'Justice',
      sports: 'Sports', economy: 'Economy', business: 'Business',
      science: 'Tech', health: 'Health', lifestyle: 'Living',
      religion: 'Society', labour: 'Work', governance: 'Government',
      disaster: 'Disaster', environment: 'Climate', society: 'Society',
    };
    const FAMILY_BLURB = {
      politics: 'Power, parties, parliament.',
      war: 'Conflict, diplomacy, the world.',
      justice: 'Courts, enforcement, crime.',
      sports: 'Pitches, courts, rinks.',
      economy: 'Markets, trade, money.',
      business: 'Corporates, deals, leadership.',
      science: 'Tech, AI, the future of work.',
      health: 'Medicine, public health, science.',
      lifestyle: 'Culture, food, leisure.',
      religion: 'Faith, festivals, society.',
      labour: 'Jobs, wages, workplaces.',
    };

    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
    }
    function fmtDateline(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
    }

    function familyLabel(fam) { return FAMILY_LABEL[fam] || (fam ? fam.charAt(0).toUpperCase() + fam.slice(1) : 'Story'); }
    function familyBlurb(fam) { return FAMILY_BLURB[fam] || ''; }

    function preload(url) {
      return new Promise((res, rej) => {
        const img = new Image();
        const t = setTimeout(() => rej(), 5000);
        img.onload = () => { clearTimeout(t); res(url); };
        img.onerror = () => { clearTimeout(t); rej(); };
        img.src = url;
      });
    }
    async function resolveImage(card) {
      const tries = [card.image_url, TOI_PHOTO(card.msid)].filter(Boolean);
      for (const url of tries) { try { return await preload(url); } catch {} }
      return null;
    }

    function pickFrontPage(cards, n = 4) {
      const front = [];
      const seen = new Set();
      for (const c of cards) {
        if (seen.has(c.section_family)) continue;
        front.push(c); seen.add(c.section_family);
        if (front.length >= n) break;
      }
      if (front.length < n) {
        for (const c of cards) {
          if (front.includes(c)) continue;
          front.push(c);
          if (front.length >= n) break;
        }
      }
      return front;
    }

    function groupBySection(cards) {
      const order = [];
      const groups = new Map();
      for (const c of cards) {
        const k = c.section_family || 'other';
        if (!groups.has(k)) { groups.set(k, []); order.push(k); }
        groups.get(k).push(c);
      }
      return order.map(k => ({ family: k, cards: groups.get(k) }));
    }

    /* ===== Story render primitives ===== */

    function storyKicker(c) {
      const sec = familyLabel(c.section_family).toUpperCase();
      const tag = (c.headline || '').trim();
      return `
        <div class="kicker">
          <span>${escapeHTML(sec)}</span>
          <span class="sep"></span>
          <span class="tag">${escapeHTML(tag)}</span>
        </div>`;
    }

    function storyByline(c, opts = {}) {
      const date = fmtDate(c.published_at);
      return `
        <div class="byline">
          <span>${escapeHTML(date)}</span>
          <span class="read">${opts.readLabel || 'Read'}</span>
        </div>`;
    }

    function renderHero(c, imageUrl) {
      const img = imageUrl ? `
        <div class="image">
          <img src="${imageUrl}" alt="" loading="lazy" decoding="async">
          <span class="caption">${escapeHTML(familyLabel(c.section_family))} · MSID ${escapeHTML(c.msid)}</span>
        </div>` : '';
      return `
        <a class="story" href="${TOI_ARTICLE(c.msid)}" target="_blank" rel="noopener">
          ${img}
          ${storyKicker(c)}
          <h2 class="headline">${escapeHTML(c.summary || '')}</h2>
          <p class="deck">${escapeHTML(c.summary ? '' : (c.headline || ''))}</p>
          ${storyByline(c, { readLabel: 'Read story' })}
        </a>`;
    }

    function renderHeroBlock(c, imageUrl) {
      return `<div class="block-hero">${renderHero(c, imageUrl)}</div>`;
    }

    function renderTwoUp(a, b) {
      return `
        <div class="block-twoup${b ? '' : ' single'}">
          ${renderCompact(a)}
          ${b ? renderCompact(b) : ''}
        </div>`;
    }

    function renderThreeUp(a, b, c) {
      return `
        <div class="block-threeup">
          ${renderCompact(a)}
          ${renderCompact(b)}
          ${renderCompact(c)}
        </div>`;
    }

    function renderCompact(c) {
      return `
        <a class="story" href="${TOI_ARTICLE(c.msid)}" target="_blank" rel="noopener">
          ${storyKicker(c)}
          <h3 class="headline">${escapeHTML(c.summary || '')}</h3>
          ${storyByline(c)}
        </a>`;
    }

    function renderBriefBlock(c, imageUrl) {
      if (imageUrl) {
        return `
          <div class="block-brief">
            <a class="story with-image" href="${TOI_ARTICLE(c.msid)}" target="_blank" rel="noopener">
              <div class="brief-text">
                ${storyKicker(c)}
                <h3 class="headline">${escapeHTML(c.summary || '')}</h3>
                ${storyByline(c)}
              </div>
              <div class="image"><img src="${imageUrl}" alt="" loading="lazy" decoding="async"></div>
            </a>
          </div>`;
      }
      return `
        <div class="block-brief">
          <a class="story" href="${TOI_ARTICLE(c.msid)}" target="_blank" rel="noopener">
            ${storyKicker(c)}
            <h3 class="headline">${escapeHTML(c.summary || '')}</h3>
            ${storyByline(c)}
          </a>
        </div>`;
    }

    function renderPullQuote(text, attr) {
      return `
        <div class="block-pullquote">
          <q>${escapeHTML(text)}</q>
          <span class="attr">${escapeHTML(attr)}</span>
        </div>`;
    }

    /* ===== Page composition ===== */

    function composeFront(cards, images, edition) {
      const blocks = [];
      blocks.push(renderHeroBlock(cards[0], images[cards[0].msid]));
      const rest = cards.slice(1);
      // Below-the-fold: pack secondaries into a 3-up column row (newspaper pattern).
      // Avoid full-width briefs on the front page — they over-weight a single small card.
      if (rest.length >= 3) {
        blocks.push(renderThreeUp(rest[0], rest[1], rest[2]));
      } else if (rest.length === 2) {
        blocks.push(renderTwoUp(rest[0], rest[1]));
      } else if (rest.length === 1) {
        blocks.push(renderTwoUp(rest[0], null));
      }
      return `
        <section class="page" id="sec-front" data-section="front">
          <div class="page-flag">
            <span class="meta">Catch Me Up · ${escapeHTML(edition.dateline)}</span>
            <span class="section-name">Front Page</span>
          </div>
          <h2 class="section-title">Today.</h2>
          ${blocks.join('')}
        </section>`;
    }

    function composeSection(group, images, edition) {
      const fam = group.family;
      const label = familyLabel(fam);
      const blurb = familyBlurb(fam);
      const cards = group.cards;
      const blocks = [];

      // first story → hero
      blocks.push(renderHeroBlock(cards[0], images[cards[0].msid]));

      const rest = cards.slice(1);
      let i = 0;
      while (i < rest.length) {
        const remaining = rest.length - i;
        if (remaining >= 3) {
          // optional pullquote between blocks for sections with 4+ cards
          if (cards.length >= 4 && i === 0 && rest[0].summary) {
            blocks.push(renderPullQuote(rest[0].summary, `${label} · ${rest[0].headline}`));
          }
          blocks.push(renderThreeUp(rest[i], rest[i+1], rest[i+2]));
          i += 3;
        } else if (remaining === 2) {
          blocks.push(renderTwoUp(rest[i], rest[i+1]));
          i += 2;
        } else {
          blocks.push(renderBriefBlock(rest[i], images[rest[i].msid]));
          i += 1;
        }
      }

      return `
        <section class="page" id="sec-${fam}" data-section="${fam}">
          <div class="page-flag">
            <span class="meta">Catch Me Up · ${escapeHTML(edition.dateline)}</span>
            <span class="section-name">${escapeHTML(label)}</span>
          </div>
          <h2 class="section-title">${escapeHTML(label)}<em>.</em></h2>
          ${blurb ? `<p class="section-blurb">${escapeHTML(blurb)}</p>` : ''}
          ${blocks.join('')}
        </section>`;
    }

    function renderEnd(data) {
      return `
        <section class="end">
          <div class="mark">·  ·  ·</div>
          <div class="text">You're <em>caught up</em>.</div>
          <div class="meta">${data.total_cards} stories · edition closed at ${escapeHTML(fmtDate(data.generated_at))}</div>
          <div class="colophon">A finite, daily edition. Built to be read in five minutes and put down.</div>
        </section>`;
    }

    function renderInsideBar(sections) {
      const items = sections.map(s =>
        `<a href="#sec-${s.family}">${escapeHTML(familyLabel(s.family))}</a>`
      );
      $('#inside-bar').innerHTML = `<span class="label">Inside today:</span>` + items.join('');
    }

    function showError(msg) {
      $('#paper-body').innerHTML = `
        <div class="error">
          <h2>No edition yet.</h2>
          <p>Generate <code>output/cards.json</code> with the rewrite prompt, then refresh.</p>
          <p>Tip: serve from the project root with <code>python3 -m http.server 8000</code> and open <code>http://localhost:8000/web/</code>.</p>
          <p style="opacity:.6">${escapeHTML(msg)}</p>
        </div>`;
    }

    async function loadCards() {
      const inline = document.getElementById('cards-data');
      if (inline) {
        const raw = inline.textContent.replace('<!--BEGIN_INLINE_DATA-->', '').replace('<!--END_INLINE_DATA-->', '').trim();
        if (raw) { try { return JSON.parse(raw); } catch (e) { console.warn('inline parse failed', e); } }
      }
      const candidates = ['../output/cards.json', 'output/cards.json'];
      let lastErr;
      for (const url of candidates) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) { lastErr = `${url}: ${res.status}`; continue; }
          return await res.json();
        } catch (e) { lastErr = `${url}: ${e.message}`; }
      }
      throw new Error(lastErr || 'cards.json not found');
    }

    async function buildPaper(data) {
      const dateline = fmtDateline(data.data_now || data.generated_at);
      $('#edition-date').textContent = dateline;
      $('#edition-no').textContent = String(data.total_cards).padStart(3, '0');

      // pick front page (one per section family)
      const front = pickFrontPage(data.cards, 4);
      const frontIds = new Set(front.map(c => c.msid));
      const remaining = data.cards.filter(c => !frontIds.has(c.msid));
      const sections = groupBySection(remaining);

      // resolve images: front-page lead + 4th front-page card + first card of every section
      const wantImages = new Set([
        front[0].msid,
        ...(front[3] ? [front[3].msid] : []),
        ...sections.map(g => g.cards[0].msid),
      ]);
      const images = {};
      await Promise.all(data.cards.map(async c => {
        if (!wantImages.has(c.msid)) return;
        const url = await resolveImage(c);
        if (url) images[c.msid] = url;
      }));

      // index ribbon (no tabs — newspaper has no sticky nav)
      renderInsideBar(sections);

      const edition = {
        dateline,
        sectionsCount: sections.length + 1, // +1 for front
      };

      const html = [
        composeFront(front, images, edition),
        ...sections.map(g => composeSection(g, images, edition)),
        renderEnd(data),
      ].join('');

      $('#paper-body').innerHTML = html;
    }

    loadCards().then(buildPaper).catch(err => showError(err.message || String(err)));
  </script>
